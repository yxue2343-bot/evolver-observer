<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolver Observer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Evolver Observer</h1>
        <p id="subline">加载中...</p>
      </div>
      <div class="live">
        <span class="dot" id="liveDot"></span>
        <span id="liveText">检查中</span>
      </div>
    </header>

    <main>
      <section class="panel hero" id="hero"></section>

      <section class="panel">
        <h2>更新状态</h2>
        <div class="kv" id="freshness"></div>
      </section>

      <section class="panel">
        <h2>核心指标（带解释）</h2>
        <div id="metrics" class="metrics"></div>
      </section>

      <section class="panel split">
        <div>
          <h2>最近基因（它们有什么用）</h2>
          <div id="genes" class="list"></div>
        </div>
        <div>
          <h2>最近胶囊（它们沉淀了什么）</h2>
          <div id="capsules" class="list"></div>
        </div>
      </section>

      <section class="panel">
        <h2>候选能力（还在观察）</h2>
        <div id="candidates" class="list"></div>
      </section>

      <section class="panel">
        <h2>最近在做什么（中文时间线）</h2>
        <ul id="timeline" class="timeline"></ul>
      </section>

      <section class="panel">
        <h2>最近演化事件</h2>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>类型</th>
                <th>结果</th>
                <th>评分</th>
                <th>说明</th>
              </tr>
            </thead>
            <tbody id="eventsBody"></tbody>
          </table>
        </div>
      </section>

      <details class="panel">
        <summary>技术详情（原始日志）</summary>
        <pre id="logTail"></pre>
      </details>
    </main>

    <script src="app.js"></script>
  </body>
</html>
